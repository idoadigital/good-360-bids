<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 42px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 19px Arial, sans-serif; fill: #5d6678; }
      .section-title { font: 700 22px Arial, sans-serif; fill: #172033; }
      .label { font: 700 18px Arial, sans-serif; fill: #172033; }
      .small { font: 400 15px Arial, sans-serif; fill: #485266; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #596376; }
      .mono { font: 400 14px Menlo, Consolas, monospace; fill: #344052; }
      .box { fill: #ffffff; stroke: #cfd6e4; stroke-width: 2; rx: 10; }
      .box-blue { fill: #eef5ff; stroke: #79a9e8; stroke-width: 2; rx: 10; }
      .box-green { fill: #edf9f2; stroke: #65bd83; stroke-width: 2; rx: 10; }
      .box-yellow { fill: #fff8e8; stroke: #d9a441; stroke-width: 2; rx: 10; }
      .box-red { fill: #fff0f0; stroke: #d96b6b; stroke-width: 2; rx: 10; }
      .box-purple { fill: #f4f0ff; stroke: #9b7de0; stroke-width: 2; rx: 10; }
      .box-gray { fill: #f0f3f7; stroke: #aeb8c8; stroke-width: 2; rx: 10; }
      .lane { fill: #ffffff; stroke: #dce2ed; stroke-width: 2; rx: 16; }
      .arrow { stroke: #3d4b63; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #8190a8; stroke-width: 2.5; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 8 6; }
      .arrow-green { stroke: #2e8f53; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-red { stroke: #b84343; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .pill { fill: #172033; rx: 16; }
      .pill-text { font: 700 13px Arial, sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d4b63"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8190a8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e8f53"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b84343"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1320"/>

  <text class="title" x="70" y="72">Good360 Monitor / Auto-Buy System: End-to-End Flow</text>
  <text class="subtitle" x="72" y="106">How truck detection, alerts, checkout engines, DevTools MCP agent, health checks, dashboards, and intake fit together.</text>

  <rect class="lane" x="55" y="140" width="1690" height="260"/>
  <text class="section-title" x="85" y="178">1. Runtime Services</text>

  <rect class="box-blue" x="85" y="210" width="235" height="135"/>
  <text class="label" x="110" y="242">monitor</text>
  <text class="mono" x="110" y="270">good360_monitor.py</text>
  <text class="small" x="110" y="296">Main scanner</text>
  <text class="small" x="110" y="319">Detects trucks + starts checkout</text>

  <rect class="box-purple" x="365" y="210" width="235" height="135"/>
  <text class="label" x="390" y="242">daemon</text>
  <text class="mono" x="390" y="270">good360_daemon.py</text>
  <text class="small" x="390" y="296">Persistent browser</text>
  <text class="small" x="390" y="319">Fast /checkout API</text>

  <rect class="box-yellow" x="645" y="210" width="235" height="135"/>
  <text class="label" x="670" y="242">watchdog</text>
  <text class="mono" x="670" y="270">good360_watchdog.py</text>
  <text class="small" x="670" y="296">Detects stale scans</text>
  <text class="small" x="670" y="319">Sends recovery/down alerts</text>

  <rect class="box-green" x="925" y="210" width="235" height="135"/>
  <text class="label" x="950" y="242">telegram-bot</text>
  <text class="mono" x="950" y="270">good360_telegram_bot.py</text>
  <text class="small" x="950" y="296">/status /logs /test</text>
  <text class="small" x="950" y="319">/pause /resume /approve</text>

  <rect class="box-gray" x="1205" y="210" width="235" height="135"/>
  <text class="label" x="1230" y="242">missioncontrol</text>
  <text class="mono" x="1230" y="270">server_v2.py :5001</text>
  <text class="small" x="1230" y="296">Dashboard + API</text>
  <text class="small" x="1230" y="319">Pause/status/logs</text>

  <rect class="box-gray" x="1485" y="210" width="220" height="135"/>
  <text class="label" x="1510" y="242">intake</text>
  <text class="mono" x="1510" y="270">intake_form :5000</text>
  <text class="small" x="1510" y="296">Org onboarding form</text>
  <text class="small" x="1510" y="319">Review queue</text>

  <rect class="lane" x="55" y="430" width="1690" height="390"/>
  <text class="section-title" x="85" y="468">2. Truck Detection and Decision Path</text>

  <rect class="box-blue" x="85" y="510" width="255" height="150"/>
  <text class="label" x="112" y="543">Login + Scrape</text>
  <text class="mono" x="112" y="571">check_trucks()</text>
  <text class="small" x="112" y="598">Good360 Amazon truckloads</text>
  <text class="small" x="112" y="622">Extract names, status, URLs</text>

  <rect class="box" x="395" y="510" width="255" height="150"/>
  <text class="label" x="422" y="543">Classify Truck</text>
  <text class="small" x="422" y="574">Track: unsorted, variety, assorted</text>
  <text class="small" x="422" y="598">Exclude: softline</text>
  <text class="small" x="422" y="622">Detect newly available only</text>

  <rect class="box-green" x="705" y="510" width="255" height="150"/>
  <text class="label" x="732" y="543">Alert First</text>
  <text class="small" x="732" y="574">Email + Telegram</text>
  <text class="small" x="732" y="598">Truck available now</text>
  <text class="small" x="732" y="622">Sent before checkout attempt</text>

  <rect class="box-yellow" x="1015" y="510" width="255" height="150"/>
  <text class="label" x="1042" y="543">Match Org</text>
  <text class="mono" x="1042" y="571">load_orgs()</text>
  <text class="small" x="1042" y="598">auto_buy_targets match</text>
  <text class="small" x="1042" y="622">Skip paused / cooldown orgs</text>

  <rect class="box-yellow" x="1325" y="510" width="255" height="150"/>
  <text class="label" x="1352" y="543">Safety Gate</text>
  <text class="small" x="1352" y="574">Single-purchase lock</text>
  <text class="small" x="1352" y="598">Cooldown check</text>
  <text class="small" x="1352" y="622">Max price guard</text>

  <path class="arrow" d="M340 585 H395"/>
  <path class="arrow" d="M650 585 H705"/>
  <path class="arrow" d="M960 585 H1015"/>
  <path class="arrow" d="M1270 585 H1325"/>

  <rect class="box-gray" x="85" y="700" width="1495" height="75"/>
  <text class="label" x="112" y="732">State Written Every Run</text>
  <text class="small" x="112" y="759">good360_alerted_state.json prevents duplicate alerts; good360_run_log.json stores scan history; good360_heartbeat.json proves the monitor is alive.</text>

  <path class="arrow-soft" d="M212 660 V700"/>
  <path class="arrow-soft" d="M832 660 V700"/>
  <path class="arrow-soft" d="M1452 660 V700"/>

  <rect class="lane" x="55" y="850" width="1690" height="340"/>
  <text class="section-title" x="85" y="888">3. Checkout Engines and Outcome Notifications</text>

  <rect class="box-purple" x="85" y="930" width="325" height="185"/>
  <text class="label" x="112" y="963">Optional DevTools MCP Agent</text>
  <text class="mono" x="112" y="991">AUTOBUY_ENGINE=devtools_agent</text>
  <text class="small" x="112" y="1018">good360_devtools_agent.py</text>
  <text class="small" x="112" y="1042">OpenAI Agent + chrome-devtools-mcp</text>
  <text class="small" x="112" y="1066">Inspects DOM, console, network, frames</text>
  <text class="small" x="112" y="1090">Dry-run/live guarded by env flags</text>

  <rect class="box-purple" x="470" y="930" width="300" height="185"/>
  <text class="label" x="497" y="963">Persistent Daemon</text>
  <text class="mono" x="497" y="991">POST /checkout :5002</text>
  <text class="small" x="497" y="1018">Reuses browser cookies per org</text>
  <text class="small" x="497" y="1042">Logs in, adds to cart</text>
  <text class="small" x="497" y="1066">Fills answers/card</text>
  <text class="small" x="497" y="1090">Returns status + elapsed time</text>

  <rect class="box-purple" x="830" y="930" width="300" height="185"/>
  <text class="label" x="857" y="963">Fallback Script</text>
  <text class="mono" x="857" y="991">good360_autobuy.py</text>
  <text class="small" x="857" y="1018">Fresh Playwright checkout</text>
  <text class="small" x="857" y="1042">Screenshots each step</text>
  <text class="small" x="857" y="1066">3-state detection</text>
  <text class="small" x="857" y="1090">SUCCESS / MISSED / FAILED</text>

  <rect class="box-green" x="1190" y="905" width="250" height="120"/>
  <text class="label" x="1217" y="938">SUCCESS</text>
  <text class="small" x="1217" y="968">Order confirmation found</text>
  <text class="small" x="1217" y="992">Notify: email + Telegram</text>

  <rect class="box-red" x="1485" y="905" width="220" height="120"/>
  <text class="label" x="1512" y="938">FAILED / BLOCKED</text>
  <text class="small" x="1512" y="968">Payment or page error</text>
  <text class="small" x="1512" y="992">Notify with redacted details</text>

  <rect class="box-yellow" x="1190" y="1065" width="250" height="95"/>
  <text class="label" x="1217" y="1098">MISSED / MANUAL</text>
  <text class="small" x="1217" y="1128">Sold out, price too high, or</text>
  <text class="small" x="1217" y="1151">human action required</text>

  <path class="arrow" d="M1580 585 C1650 700, 1500 835, 410 995"/>
  <path class="arrow" d="M410 1022 H470"/>
  <path class="arrow" d="M770 1022 H830"/>
  <path class="arrow-green" d="M1130 985 H1190"/>
  <path class="arrow-red" d="M1130 1048 C1275 1048, 1350 965, 1485 965"/>
  <path class="arrow" d="M1130 1088 H1190"/>

  <rect class="box-gray" x="85" y="1220" width="1620" height="65"/>
  <text class="label" x="112" y="1248">External Channels and Operators</text>
  <text class="small" x="112" y="1275">Telegram groups, operator chat, alert emails, Mission Control dashboard, and intake approvals all read/write shared state in the Docker volume mounted at $WORKDIR.</text>

  <rect class="pill" x="85" y="365" width="155" height="28"/>
  <text class="pill-text" x="102" y="384">docker compose</text>
  <rect class="pill" x="85" y="785" width="176" height="28"/>
  <text class="pill-text" x="102" y="804">shared WORKDIR volume</text>
  <rect class="pill" x="85" y="1152" width="176" height="28"/>
  <text class="pill-text" x="102" y="1171">redacted diagnostics</text>
</svg>
