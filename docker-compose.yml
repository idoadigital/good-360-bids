# docker-compose for good360-monitor.
# Each concern runs as its own always-restarting service so a crash in one
# doesn't take down the others (another April 13 postmortem lesson).

services:
  monitor:
    build: .
    image: good360-monitor:local
    restart: always
    # tini reaps zombie chromium subprocesses left behind by Playwright —
    # without it they accumulate and eventually exhaust the PID table,
    # wedging the scan loop. Same reason as missioncontrol below.
    init: true
    command: python good360_monitor.py
    env_file: .env
    volumes:
      - workdir:/app/workdir
      - roster_data:/app/good360_roster/db
      # Hot-reload of dashboard modules and the settings-bootstrap shim.
      # Lets us iterate without rebuilding the image.
      - ./missioncontrol:/app/missioncontrol:ro
      - ./settings_bootstrap.py:/app/settings_bootstrap.py:ro
      - ./good360_monitor.py:/app/good360_monitor.py:ro
      - ./good360_autobuy.py:/app/good360_autobuy.py:ro
      - ./feature_flags.py:/app/feature_flags.py:ro
      - ./good360_devtools_agent.py:/app/good360_devtools_agent.py:ro
      - ./good360_roster/good360_autobuy_v2.py:/app/good360_roster/good360_autobuy_v2.py:ro
      - ./notifications_log.py:/app/notifications_log.py:ro
      - ./sandbox.py:/app/sandbox.py:ro
      - ./audit_log.py:/app/audit_log.py:ro
      - ./purchase_lock.py:/app/purchase_lock.py:ro
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

  daemon:
    image: good360-monitor:local
    restart: always
    init: true
    command: python good360_daemon.py
    env_file: .env
    healthcheck:
      # The image-level healthcheck reads the MONITOR's heartbeat file, which
      # let a dead daemon sit 'healthy' for two weeks (June 16 2026 wedge).
      # This checks the daemon's OWN port instead.
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://127.0.0.1:5002/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    volumes:
      - workdir:/app/workdir
      - roster_data:/app/good360_roster/db
      # Bind-mount so daemon edits land without an image rebuild
      # (matches the pattern used for monitor / watchdog / telegram-bot).
      - ./good360_daemon.py:/app/good360_daemon.py:ro
      - ./purchase_lock.py:/app/purchase_lock.py:ro
      - ./sandbox.py:/app/sandbox.py:ro
      - ./feature_flags.py:/app/feature_flags.py:ro
    ports:
      - "5002:5002"
    depends_on: [monitor]

  watchdog:
    image: good360-monitor:local
    restart: always
    init: true
    command: python good360_watchdog.py
    env_file: .env
    volumes:
      - workdir:/app/workdir
      # Bind-mount so watchdog edits land without an image rebuild
      # (matches the pattern used for monitor / telegram-bot).
      - ./good360_watchdog.py:/app/good360_watchdog.py:ro
      - ./feature_flags.py:/app/feature_flags.py:ro

  telegram-bot:
    image: good360-monitor:local
    restart: always
    init: true
    command: python good360_telegram_bot.py
    env_file: .env
    volumes:
      - workdir:/app/workdir
      # Bind-mount the moving Python so settings_bootstrap + token guard
      # land without an image rebuild.
      - ./good360_telegram_bot.py:/app/good360_telegram_bot.py:ro
      - ./feature_flags.py:/app/feature_flags.py:ro
      - ./settings_bootstrap.py:/app/settings_bootstrap.py:ro
      - ./missioncontrol:/app/missioncontrol:ro

  missioncontrol:
    image: good360-monitor:local
    restart: always
    # tini as PID 1 reaps orphaned chrome subprocesses left behind by the
    # healthcheck's playwright probe; without this they accumulate as
    # zombies and eventually deadlock the app.
    init: true
    # gunicorn (production WSGI) replaces Flask's dev server, whose
    # threaded-TLS handler leaks sockets in CLOSE_WAIT and eventually
    # stops accepting connections. Multiple workers prevent a single slow
    # request (or stuck Python op) from wedging all new TLS handshakes —
    # the prior 1-worker config produced periodic site-wide unavailability.
    # The QuickBeed poll thread uses a fcntl flock so only one worker runs
    # it (see _start_quickbeed_poll_thread in server_v2.py).
    #
    # TLS termination now happens in front of this process at the `caddy`
    # service (Let's Encrypt cert for podhost.club). gunicorn listens in
    # plain HTTP on the docker bridge network only — never directly
    # exposed to the public internet.
    command: >-
      gunicorn
      --pythonpath /app/missioncontrol
      --worker-class gthread
      --workers 3
      --threads 8
      --bind 0.0.0.0:5001
      --forwarded-allow-ips=*
      --timeout 60
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --error-logfile -
      server_v2:app
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://127.0.0.1:5001/login"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    volumes:
      - workdir:/app/workdir
      # Bind-mount the dashboard source so we can iterate on css/js/python
      # without rebuilding the image every time.
      - ./missioncontrol:/app/missioncontrol:ro
      # Bind-mount the devtools agent so test-runner edits land without a
      # full image rebuild. Read-only.
      - ./good360_devtools_agent.py:/app/good360_devtools_agent.py:ro
      - ./notifications_log.py:/app/notifications_log.py:ro
      - ./settings_bootstrap.py:/app/settings_bootstrap.py:ro
      # Self-signed TLS cert for HTTPS on the dashboard's public listener.
      - ./tls:/app/tls:ro
      # Settings writer needs to mutate the host .env so service restarts
      # pick up new values. RW on purpose.
      - ./.env:/app/.env
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      # Restart sibling services from the dashboard. WARNING: mounting the
      # docker socket grants effective host root to anything in this
      # container — keep the dashboard's auth strong.
      - /var/run/docker.sock:/var/run/docker.sock
      # The dashboard's Apply step invokes `docker compose up -d` so sibling
      # containers re-read .env at recreation time. Compose's relative bind
      # mounts (e.g. ./settings_bootstrap.py) are sent to the daemon as paths
      # the daemon resolves on the HOST. Mounting the project root at the
      # same host path inside this container lets compose's --project-directory
      # produce paths that exist on both sides. Read-only is enough — compose
      # only needs to read the project .env and reference the source tree.
      - /root/good-360-bids:/root/good-360-bids:ro
      # Shared roster.db so missioncontrol can sync QuickBeed customers into
      # the nonprofits table that monitor/daemon's orchestrator reads from.
      - roster_data:/app/good360_roster/db
    # No host port mapping: missioncontrol is reachable only over the
    # docker bridge network. Public traffic enters via caddy on 443.
    expose:
      - "5001"

  caddy:
    image: caddy:2
    restart: always
    # Caddy binds 80 + 443 on the host and terminates TLS for
    # podhost.club AND the staging./feature. subdomains. It reaches the
    # non-prod dashboards over the shared external `edge` network (created
    # once with `docker network create edge`; the staging/feature compose
    # stacks attach their dashboard services to it). Declaring it here keeps
    # the attachment across future caddy recreations — the initial hookup on
    # the live container was done with `docker network connect edge ...` to
    # avoid restarting prod.
    networks:
      - default
      - edge
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Cert state persists across container recreations. Without this,
      # every `compose up -d` would request a fresh Let's Encrypt cert
      # and we'd hit the 5-per-week rate limit fast.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - missioncontrol

  intake:
    image: good360-monitor:local
    restart: always
    command: python intake_form/server.py
    env_file: .env
    volumes:
      - workdir:/app/workdir
    ports:
      - "5000:5000"

volumes:
  workdir:
  roster_data:
  caddy_data:
  caddy_config:

networks:
  # Shared edge network: prod caddy <-> staging/feature dashboards.
  # Created out-of-band (`docker network create edge`) so no compose
  # project owns or removes it.
  edge:
    external: true
